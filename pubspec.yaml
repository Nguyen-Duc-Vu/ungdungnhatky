name: ungdungnhatky
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cupertino_icons: ^1.0.8

  path_provider: ^2.1.3
  path: ^1.9.0
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_launcher_icons: ^0.14.4
  camera: ^0.10.5+9        # Quay video
  permission_handler: ^11.3.0  # Xin quyền camera & mic
  saver_gallery: ^3.0.6
  video_player: ^2.8.3        # phát video
  image_picker: ^1.0.7        # đã có, đảm bảo đúng version







dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ✅ thêm assets icon
  assets:
    - assets/icon/app_icon.png

# ✅ cấu hình tạo icon app
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"